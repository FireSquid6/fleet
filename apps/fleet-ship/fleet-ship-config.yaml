# Fleet Ship configuration.
#
# Copy this file to `fleet-ship-config.yaml` (or point `fleet-ship start -c` at
# your own copy) and adjust the values below.

# Directory that holds all workspaces, laid out as <fleetDirectory>/<repo>/<name>.
# Resolved to an absolute path at load time.
fleetDirectory: ./fleet-data

# Port the ship's HTTP + WebSocket API listens on.
port: 4700

# Human-facing name of this ship, surfaced as `ship` on active workspace status.
name: my-ship
